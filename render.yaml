services:
    - type: web
      name: archigen-backend
      env:  docker
      region: singapore
      plan: free
      dockerfilePath: ./backend/Dockerfile 
      envVars:
        - key: PYTHONUNBUFFERED
          value: 1
        - key: CLERK_ISSUER
          sync: false 
        - key: GROQ_API_KEY
          sync: false 
      disk:
        name: archigen-data
        mountPath: /app
        sizeGB: 1
        